name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Build images
        run: docker compose build

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "hng14-stage2-devops-api"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v3

      - name: Start full system
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Test API health
        run: curl --fail http://localhost:8000/health

      - name: Test job creation
        run: curl -X POST http://localhost:8000/jobs

      - name: Shutdown system
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy placeholder
        run: echo "Deployment step (add SSH/VPS deployment here)"
