name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ========================= LINT =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api/main.py worker/worker.py

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . || true

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error


# ========================= TEST =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install fastapi uvicorn redis pytest httpx pytest-cov

      - run: pytest api/tests --cov=api --cov-report=xml
        env:
          PYTHONPATH: .

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ========================= BUILD =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - run: docker build -f api/Dockerfile -t api:latest ./api
      - run: docker build -f worker/Dockerfile -t worker:latest ./worker
      - run: docker build -f frontend/Dockerfile -t frontend:latest ./frontend

      - run: |
          docker save api:latest -o /tmp/api.tar
          docker save worker:latest -o /tmp/worker.tar
          docker save frontend:latest -o /tmp/frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1


# ========================= SECURITY SCAN =========================
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - run: |
          docker load -i /tmp/api.tar
          docker load -i /tmp/worker.tar
          docker load -i /tmp/frontend.tar

      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: api:latest
          format: sarif
          output: trivy-api.sarif

      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: worker:latest
          format: sarif
          output: trivy-worker.sarif

      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: frontend:latest
          format: sarif
          output: trivy-frontend.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: api

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-worker.sarif
          category: worker

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend


# ========================= INTEGRATION TEST =========================
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y curl jq

      # ✅ FIX: ensure .env exists (prevents your crash)
      - name: Create env file
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_HOST=api
          API_PORT=8000
          EOF

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Create job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for completion
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Shutdown
        if: always()
        run: docker compose down


# ========================= DEPLOY =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4
      - run: echo "Rolling deployment logic goes here"
