name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: localhost:5000

jobs:

# ========================= LINT =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api/main.py worker/worker.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . || true

      - name: Lint Dockerfile (api)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile (worker)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile (frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error


# ========================= TEST =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn redis pytest httpx pytest-cov

      - name: Run tests
        run: pytest -q api/tests --cov=api --cov-report=xml
        env:
          PYTHONPATH: api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ========================= BUILD =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Set image SHA tag
        run: echo "SHA_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:latest
            ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:latest
            ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:latest
            ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images as artifacts
        run: |
          docker pull $REGISTRY/api:latest
          docker pull $REGISTRY/worker:latest
          docker pull $REGISTRY/frontend:latest
          docker save $REGISTRY/api:latest -o /tmp/api.tar
          docker save $REGISTRY/worker:latest -o /tmp/worker.tar
          docker save $REGISTRY/frontend:latest -o /tmp/frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar


# ========================= SECURITY =========================
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load and retag Docker images
        run: |
          docker load -i /tmp/api.tar
          docker load -i /tmp/worker.tar
          docker load -i /tmp/frontend.tar
          docker tag localhost:5000/api:latest api:latest
          docker tag localhost:5000/worker:latest worker:latest
          docker tag localhost:5000/frontend:latest frontend:latest

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --ignorefile .trivyignore \
            --format sarif --output trivy-api.sarif api:latest

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --ignorefile .trivyignore \
            --format sarif --output trivy-worker.sarif worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --ignorefile .trivyignore \
            --format sarif --output trivy-frontend.sarif frontend:latest

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: api

      - name: Upload Worker SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-worker.sarif
          category: worker

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend


# ========================= INTEGRATION =========================
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install curl and jq
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Create .env
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_HOST=api
          API_PORT=8000
          EOF

      - name: Start services
        run: docker compose up -d --build

      - name: Run integration test script
        run: bash integration_test.sh

      - name: Tear down services
        if: always()
        run: docker compose down


# ========================= DEPLOY =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling deployment
        run: echo "Rolling deployment logic goes here"
