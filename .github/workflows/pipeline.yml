name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run flake8 (strict scope)
        run: flake8 api/main.py worker/worker.py


  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: |
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn redis pytest httpx

      # 🔥 FIX: MAKE PYTHON FIND YOUR api MODULE
      - name: Run tests
        run: pytest api/tests
        env:
          PYTHONPATH: .


  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build


  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "hng14-stage2-devops-api"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"


  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_HOST=api" >> .env
          echo "API_PORT=8000" >> .env

      - name: Start full system
        run: docker compose up -d --build

      # Better than blind sleep (but still simple)
      - name: Wait for services
        run: sleep 30

      - name: Test API health
        run: curl --fail http://localhost:8000/health

      - name: Test job creation
        run: |
          curl -X POST http://localhost:8000/jobs

      # 🔥 IMPORTANT: always shut down even if test fails
      - name: Shutdown system
        if: always()
        run: docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "Deployment step (add SSH/VPS deployment here)"
