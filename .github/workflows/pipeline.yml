name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ========================= LINT =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api/main.py worker/worker.py

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . || true

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error


# ========================= TEST =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn redis pytest httpx pytest-cov

      - name: Run tests
        run: pytest -q api/tests --cov=api --cov-report=xml
        env:
          PYTHONPATH: .

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ========================= BUILD =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build API
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f api/Dockerfile \
            -t localhost:5000/api:${{ github.sha }} \
            -t localhost:5000/api:latest ./api

      - name: Build Worker
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f worker/Dockerfile \
            -t localhost:5000/worker:${{ github.sha }} \
            -t localhost:5000/worker:latest ./worker

      - name: Build Frontend
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f frontend/Dockerfile \
            -t localhost:5000/frontend:${{ github.sha }} \
            -t localhost:5000/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

      - name: Save images
        run: |
          docker save localhost:5000/api:latest -o /tmp/api.tar
          docker save localhost:5000/worker:latest -o /tmp/worker.tar
          docker save localhost:5000/frontend:latest -o /tmp/frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar


# ========================= SECURITY =========================
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load images
        run: |
          docker load -i /tmp/api.tar
          docker load -i /tmp/worker.tar
          docker load -i /tmp/frontend.tar

      # ✅ FIXED: correct image names AFTER docker load
      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: api

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-worker.sarif
          category: worker

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend


# ========================= INTEGRATION =========================
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Create .env safely
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_HOST=api
          API_PORT=8000
          EOF

      - name: Start services
        run: docker compose up -d --build

      - name: Wait API
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Create job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait job
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Shutdown (always)
        if: always()
        run: docker compose down


# ========================= DEPLOY =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4
      - run: echo "Rolling deployment logic goes here"
