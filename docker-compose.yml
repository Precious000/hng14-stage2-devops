services:

  redis:
    image: redis:7-alpine
    # ❌ REMOVED PORT EXPOSURE
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env   # ✅ REQUIRED (no hardcoding)
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build: ./worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "80:3000"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  app-net:
    name: app-net   # ✅ CRITICAL FIX
    driver: bridge
