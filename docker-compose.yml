version: "3.9"

services:
  redis:
    image: redis:7
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "80:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
