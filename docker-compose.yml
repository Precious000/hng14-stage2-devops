services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:3000"
    environment:
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  app-net:
    driver: bridge
