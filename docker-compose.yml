name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 api/main.py worker/worker.py


  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env (test-safe)
        run: |
          echo "REDIS_HOST=dummy" >> .env
          echo "REDIS_PORT=6379" >> .env

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn redis pytest httpx

      - name: Run tests
        run: pytest api/tests
        env:
          PYTHONPATH: .


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build


  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Run Trivy scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "hng14-stage2-devops-api"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"


  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Create .env (runtime)
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_HOST=api" >> .env
          echo "API_PORT=8000" >> .env

      - name: Start full system
        run: docker compose up -d --build

      # ✅ Proper health polling (FIXES YOUR FAILURE)
      - name: Wait for API health
        run: |
          for i in {1..30}; do
            curl --fail http://localhost:8000/health && exit 0
            echo "waiting for API..."
            sleep 2
          done
          echo "API did not become healthy"
          docker compose logs
          exit 1

      - name: Create job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for job completion
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi

            sleep 2
          done

          echo "Job did not complete in time"
          docker compose logs
          exit 1

      - name: Shutdown system
        if: always()
        run: docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "Deployment step (add SSH/VPS rolling update here)"
