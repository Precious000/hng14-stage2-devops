version: "3.9"

services:

  redis:
    image: redis:7
    networks:
      - appnet
    restart: always

  api:
    build: ./api
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    restart: always

  worker:
    build: ./worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "80:3000"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    restart: always

networks:
  appnet:
    driver: bridge
